# OpenWA - Coolify Deployment Configuration
# ============================================
# Use this file when deploying via Coolify.
# Coolify manages its OWN Traefik instance, so
# we remove the internal Traefik service and let
# Coolify route traffic via container labels.
#
# In Coolify, set:
#   Docker Compose File: docker-compose.coolify.yml
# ============================================

services:
  # ===== CORE: OpenWA Backend API =====
  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    shm_size: '1gb'
    restart: unless-stopped
    expose:
      - '2785'
    environment:
      # Core
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=2785
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Database
      - DATABASE_TYPE=${DATABASE_TYPE:-sqlite}
      - DATABASE_NAME=${DATABASE_NAME:-/app/data/openwa.sqlite}
      - DATABASE_HOST=${DATABASE_HOST:-openwa-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-openwa}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-openwa}
      - DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-false}
      # Engine
      - ENGINE_TYPE=${ENGINE_TYPE:-whatsapp-web.js}
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=${PUPPETEER_HEADLESS:-true}
      - PUPPETEER_ARGS=${PUPPETEER_ARGS:---no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu}
      # Storage
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_LOCAL_PATH=/app/data/media
      - S3_ENDPOINT=${S3_ENDPOINT:-http://openwa-minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-openwa}
      # Redis
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_HOST=${REDIS_HOST:-openwa-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      # Webhook
      - WEBHOOK_TIMEOUT=${WEBHOOK_TIMEOUT:-10000}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - WEBHOOK_RETRY_DELAY=${WEBHOOK_RETRY_DELAY:-5000}
      # Rate Limit
      - RATE_LIMIT_TTL=${RATE_LIMIT_TTL:-60}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      # Plugins
      - PLUGINS_ENABLED=${PLUGINS_ENABLED:-true}
      - PLUGINS_DIR=/app/data/plugins
      # Security
      - API_MASTER_KEY=${API_MASTER_KEY:-}
    volumes:
      - openwa-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      openwa-postgres:
        condition: service_healthy
        required: false
      openwa-redis:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      # --- Coolify managed labels (do not remove) ---
      - 'caddy.reverse_proxy={{upstreams 2785}}'
      # --- Traefik labels for Coolify's proxy ---
      - 'traefik.enable=true'
      - 'traefik.http.routers.openwa-api.rule=Host(`${SERVICE_FQDN_OPENWADASHBOARD}`) && PathPrefix(`/api/`, `/socket.io/`)'
      - 'traefik.http.routers.openwa-api.entrypoints=https'
      - 'traefik.http.routers.openwa-api.tls=true'
      - 'traefik.http.routers.openwa-api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.openwa-api.loadbalancer.server.port=2785'
      - 'traefik.http.routers.openwa-api.priority=100'

  # ===== CORE: Dashboard Frontend =====
  openwa-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - openwa-api
    labels:
      # --- Traefik labels for Coolify's proxy ---
      - 'traefik.enable=true'
      - 'traefik.http.routers.openwa-dashboard.rule=Host(`${SERVICE_FQDN_OPENWADASHBOARD}`)'
      - 'traefik.http.routers.openwa-dashboard.entrypoints=https'
      - 'traefik.http.routers.openwa-dashboard.tls=true'
      - 'traefik.http.routers.openwa-dashboard.tls.certresolver=letsencrypt'
      - 'traefik.http.services.openwa-dashboard.loadbalancer.server.port=80'
      - 'traefik.http.routers.openwa-dashboard.priority=1'

  # ===== OPTIONAL: PostgreSQL =====
  openwa-postgres:
    image: postgres:16-alpine
    container_name: openwa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-openwa}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-openwa}
      POSTGRES_DB: ${DATABASE_NAME:-openwa}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USERNAME:-openwa}']
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ['postgres']

  # ===== OPTIONAL: Redis =====
  openwa-redis:
    image: redis:7-alpine
    container_name: openwa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ['redis']

  # ===== OPTIONAL: MinIO =====
  openwa-minio:
    image: minio/minio
    container_name: openwa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      # Tell MinIO which URL the browser console is reachable at
      MINIO_BROWSER_REDIRECT_URL: https://${SERVICE_FQDN_MINIOCONSOLE:-minio-console.example.com}
    expose:
      - '9000'
      - '9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - 'traefik.enable=true'
      # --- MinIO S3 API (port 9000) ---
      - 'traefik.http.routers.openwa-minio-api.rule=Host(`${SERVICE_FQDN_MINIOAPI:-minio.example.com}`)'
      - 'traefik.http.routers.openwa-minio-api.entrypoints=https'
      - 'traefik.http.routers.openwa-minio-api.tls=true'
      - 'traefik.http.routers.openwa-minio-api.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.openwa-minio-api.service=openwa-minio-api-svc'
      - 'traefik.http.services.openwa-minio-api-svc.loadbalancer.server.port=9000'
      # --- MinIO Web Console (port 9001) ---
      - 'traefik.http.routers.openwa-minio-console.rule=Host(`${SERVICE_FQDN_MINIOCONSOLE:-minio-console.example.com}`)'
      - 'traefik.http.routers.openwa-minio-console.entrypoints=https'
      - 'traefik.http.routers.openwa-minio-console.tls=true'
      - 'traefik.http.routers.openwa-minio-console.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.openwa-minio-console.service=openwa-minio-console-svc'
      - 'traefik.http.services.openwa-minio-console-svc.loadbalancer.server.port=9001'
    profiles: ['minio']

volumes:
  openwa-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

networks:
  default:
    name: openwa-network
